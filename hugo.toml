# Hugo-Konfiguration – Bremer Windsurfing Club e.V.

# Bei eigener Domain auf 'https://bremerwindsurfing.de/' ändern
baseURL = 'https://acktium.github.io/bwc/'
relativeURLs = false
uglyURLs = false
languageCode = 'de'
defaultContentLanguage = 'de'
title = 'Bremer Windsurfing Club e.V.'

[module]
  [[module.imports]]
    path = "github.com/theNewDynamic/gohugo-theme-ananke/v2"

[menus]
  [[menus.main]]
    name = 'Start'
    pageRef = '/'
    weight = 10
  [[menus.main]]
    name = 'Verein'
    pageRef = '/verein'
    weight = 20
  [[menus.main]]
    name = 'Sport'
    pageRef = '/sport'
    weight = 30
  [[menus.main]]
    name = 'Termine'
    pageRef = '/termine'
    weight = 40
  [[menus.main]]
    name = 'Mitmachen'
    pageRef = '/mitmachen'
    weight = 50
  [[menus.main]]
    name = 'Kontakt'
    pageRef = '/kontakt'
    weight = 60

[params]
  description = 'Bremer Windsurfing Club e.V. – Windsurfen am Stadtwaldsee seit 1973'
  featured_image = '/images/topbildbwc.jpg'
  site_logo = 'images/bwcLogo23.png'
  custom_css = ['css/custom.css']
  facebook = 'https://www.facebook.com/windsurfenbremen'

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      # Erlaubt rohes HTML in Markdown-Dateien (nötig für Karten-Grids, Embeds, etc.)
      unsafe = true

[outputs]
  home = ['html']
  section = ['html']
  taxonomy = ['html']
  term = ['html']
